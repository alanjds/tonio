name: test

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - master
  push:
    branches:
      - master

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.14t'
        - '3.15t'

    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
    - name: Install
      run: |
        uv python install ${{ env.UV_PYTHON }}
        uv venv .venv
        uv sync --group build --group test
        uv run --no-sync maturin develop --uv
    - name: Test
      run: |
        source .venv/bin/activate
        make test

  linux-asyncio:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.14t'
        - '3.15t'

    env:
      UV_PYTHON: ${{ matrix.python-version }}
      TONIO_BACKEND: asyncio
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
    - name: Install
      run: |
        uv python install ${{ env.UV_PYTHON }}
        uv venv .venv
        uv sync --group build --group test
        uv run --no-sync maturin develop --uv
    - name: Test
      run: |
        source .venv/bin/activate
        make test

  macos:
    runs-on: macos-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.14t'
        - '3.15t'

    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
    - name: Install
      run: |
        uv python install ${{ env.UV_PYTHON }}
        uv venv .venv
        uv sync --group build --group test
        uv run --no-sync maturin develop --uv --extras=test
    - name: Test
      run: |
        source .venv/bin/activate
        make test

  windows-asyncio:
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version:
        # 3.15t is omitted on Windows: the `trustme` test dep pulls `cryptography`,
        # which has no 3.15t Windows wheel yet and fails to build from source.
        # 3.15t is still covered by the linux/macos jobs.
        - '3.14t'

    # The asyncio backend is pure Python, so the Rust extension is not built on
    # Windows: install deps only (no maturin) and put the source tree on the path.
    # bash is used so `make test` runs without touching the shared Makefile.
    defaults:
      run:
        shell: bash
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      PYTHONPATH: .
    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
    - name: Install
      run: |
        uv python install ${{ env.UV_PYTHON }}
        uv venv .venv
        uv sync --no-install-project --group test
    - name: Test
      run: |
        uv run --no-sync make test
